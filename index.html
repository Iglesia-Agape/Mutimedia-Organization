<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multimedia Workspace</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* Estilo de scroll personalizado estilo suite de edición */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #1e1e2e; }
        ::-webkit-scrollbar-thumb { background: #3a3a50; border-radius: 4px; }
    </style>
</head>
<body class="bg-[#121214] text-gray-100 font-sans antialiased min-h-screen flex">

    <aside class="w-64 bg-[#1a1a1e] border-r border-[#2a2a30] flex flex-col justify-between hidden md:flex">
        <div class="p-6">
            <div class="flex items-center gap-3 mb-8">
                <div class="w-8 h-8 bg-indigo-600 rounded-lg flex items-center justify-center font-bold text-white shadow-lg shadow-indigo-600/30">M</div>
                <span class="font-semibold text-lg tracking-wide text-gray-200">Ministerio Media</span>
            </div>
            
            <nav class="space-y-1">
                <p class="text-xs font-semibold text-gray-500 uppercase tracking-wider px-3 mb-2">Espacios de Trabajo</p>
                <a href="#" class="flex items-center gap-3 px-3 py-2 bg-[#26262b] text-indigo-400 rounded-lg font-medium text-sm transition">
                    🎬 Producción Audiovisual
                </a>
                <a href="#" class="flex items-center gap-3 px-3 py-2 text-gray-400 hover:bg-[#202024] hover:text-gray-200 rounded-lg font-medium text-sm transition">
                    🎨 Diseño Gráfico
                </a>
                <a href="#" class="flex items-center gap-3 px-3 py-2 text-gray-400 hover:bg-[#202024] hover:text-gray-200 rounded-lg font-medium text-sm transition">
                    📢 Marketing Digital
                </a>
            </nav>
        </div>
        
        <div class="p-4 border-t border-[#2a2a30] bg-[#161619] flex items-center gap-3">
            <div class="w-9 h-9 bg-purple-600 rounded-full flex items-center justify-center text-sm font-bold text-white">RR</div>
            <div>
                <p class="text-sm font-medium text-gray-300">René Raudales</p>
                <p class="text-xs text-gray-500">Multimedia</p>
            </div>
        </div>
    </aside>

    <main class="flex-1 flex flex-col min-h-screen">
        <header class="bg-[#1a1a1e] border-b border-[#2a2a30] p-6 flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4">
            <div>
                <div class="flex items-center gap-3 mb-1">
                    <span class="text-2xl">🎬</span>
                    <h1 class="text-2xl font-bold tracking-tight text-white">Flujo de Producción Audiovisual</h1>
                </div>
                <p class="text-sm text-gray-400">Gestión integrada de proyectos de video, renders y asignaciones cruzadas.</p>
            </div>
            
            <div class="flex items-center gap-2 bg-[#121214] border border-[#2a2a30] rounded-lg p-1">
                <button class="px-3 py-1.5 text-xs font-medium rounded-md bg-[#26262b] text-white shadow-sm">Todo</button>
                <button class="px-3 py-1.5 text-xs font-medium rounded-md text-gray-400 hover:text-white transition">Multimedia</button>
                <button class="px-3 py-1.5 text-xs font-medium rounded-md text-gray-400 hover:text-white transition">Asignado a mí</button>
            </div>
        </header>

        <section id="tablero-columnas" class="flex-1 p-6 flex gap-6 overflow-x-auto items-start bg-[#121214]">
            <div class="text-gray-500 text-sm animate-pulse flex items-center justify-center w-full h-64">
                Conectando con Multimedia2026 en Supabase...
            </div>
        </section>
    </main>

    <script>
        // Inicializar credenciales
        const SUPABASE_URL = "https://cpyueytgzapjguyoigsg.supabase.co";
        const SUPABASE_KEY = "sb_publishable_vXcdkr57ii27XkLuJHIK3A_rP2qYkrL";
        
        // Usamos un nombre único para evitar conflictos con el objeto global de la librería
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function cargarTablero() {
            const contenedor = document.getElementById('tablero-columnas');
            
            try {
                // Consultar segmentos usando el cliente corregido
                let { data: segmentos, error: errSeg } = await supabaseClient
                    .from('segmentos')
                    .select('*')
                    .order('posicion', { ascending: true });

                // Si da error o está vacío, muestra la opción de inicializar columnas por defecto
                if (errSeg || !segmentos || segmentos.length === 0) {
                    console.log("Inicializando o recuperando de estado vacío...");
                    contenedor.innerHTML = `
                        <div class="text-center py-12 px-4 border-2 border-dashed border-[#2a2a30] rounded-xl max-w-md mx-auto mt-12">
                            <p class="text-gray-400 text-base mb-4">El entorno está listo para ser desplegado en tu organización.</p>
                            <button onclick="crearColumnasPorDefecto()" class="px-4 py-2 bg-indigo-600 hover:bg-indigo-500 text-white font-medium text-sm rounded-lg shadow-md transition">
                                ✨ Inicializar columnas de Producción
                            </button>
                        </div>`;
                    return;
                }

                contenedor.innerHTML = '';

                // Renderizar cada segmento y sus tareas asociadas
                for (const col of segmentos) {
                    const { data: tareas } = await supabaseClient
                        .from('tareas')
                        .select('*')
                        .eq('segmento_id', col.id)
                        .order('posicion', { ascending: true });

                    let htmlTareas = '';
                    if (tareas && tareas.length > 0) {
                        tareas.forEach(tarea => {
                            let badgeColor = "bg-gray-800 text-gray-400";
                            if(tarea.prioridad === 'Alta') badgeColor = "bg-amber-500/10 text-amber-400 border border-amber-500/20";
                            if(tarea.prioridad === 'Urgente') badgeColor = "bg-rose-500/10 text-rose-400 border border-rose-500/20";

                            htmlTareas += `
                                <div class="bg-[#1a1a1e] border border-[#2a2a30] p-4 rounded-xl shadow-sm hover:border-indigo-500/40 transition-all cursor-pointer group space-y-3">
                                    ${tarea.miniatura_url ? `<img src="${tarea.miniatura_url}" class="w-full h-32 object-cover rounded-lg border border-[#2a2a30]" />` : ''}
                                    <h4 class="font-medium text-sm text-gray-200 group-hover:text-white">${tarea.titulo}</h4>
                                    <div class="flex items-center justify-between pt-1">
                                        <span class="text-[10px] px-2 py-0.5 rounded-md font-semibold tracking-wide ${badgeColor}">${tarea.prioridad}</span>
                                        <span class="text-xs text-gray-500 font-medium">${tarea.fecha_entrega ? tarea.fecha_entrega : 'Sin fecha'}</span>
                                    </div>
                                </div>`;
                        });
                    } else {
                        htmlTareas = `<div class="text-xs text-gray-600 text-center py-6 border border-dashed border-[#202024] rounded-xl">Arrastra o añade tareas aquí</div>`;
                    }

                    contenedor.innerHTML += `
                        <div class="w-80 shrink-0 flex flex-col max-h-[calc(100vh-180px)] bg-[#161619]/60 p-4 rounded-xl border border-[#202024]">
                            <div class="flex justify-between items-center mb-4">
                                <div class="flex items-center gap-2">
                                    <h3 class="font-semibold text-sm tracking-wide text-gray-300">${col.nombre}</h3>
                                    <span class="bg-[#202024] text-xs text-gray-400 px-2 py-0.5 rounded-full font-bold">${tareas ? tareas.length : 0}</span>
                                </div>
                                <button class="text-gray-500 hover:text-white transition text-lg font-bold">＋</button>
                            </div>
                            <div class="space-y-3 overflow-y-auto pr-1 flex-1">
                                ${htmlTareas}
                            </div>
                        </div>`;
                }

            } catch (error) {
                console.error("Error crítico en la interfaz:", error);
            }
        }

        async function crearColumnasPorDefecto() {
            let tableroId;
            // Verificar si ya existe un contenedor de tablero general
            const { data: tableros } = await supabaseClient.from('tableros').select('id').limit(1);
            
            if (tableros && tableros.length > 0) {
                tableroId = tableros[0].id;
            } else {
                const { data: nuevoTab } = await supabaseClient.from('tableros').insert([{ titulo: "Producción Audiovisual Principal" }]).select();
                tableroId = nuevoTab[0].id;
            }

            // Inyectar los segmentos por defecto para el equipo multimedia
            await supabaseClient.from('segmentos').insert([
                { tablero_id: tableroId, nombre: "📋 Por Empezar", posicion: 1 },
                { tablero_id: tableroId, nombre: "🎬 En Edición", posicion: 2 },
                { tablero_id: tableroId, nombre: "🚀 En Render / Revisión", posicion: 3 }
            ]);

            cargarTablero();
        }

        // Cargar el flujo de trabajo al abrir el documento
        window.onload = cargarTablero;
    </script>
</body>
</html>
